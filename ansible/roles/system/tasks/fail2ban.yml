- name: Deploy fail2ban jail config
  ansible.builtin.copy:
    src: jail.local
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  register: fail2ban_config

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started

- name: Restart fail2ban if config changed
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  when: fail2ban_config.changed
