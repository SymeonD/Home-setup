- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes

- name: Set default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow HTTP (80)
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS (443)
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow Minecraft TCP (25565)
  community.general.ufw:
    rule: allow
    port: '25565'
    proto: tcp

- name: Allow Flannel/K3s pod traffic (DEFAULT_FORWARD_POLICY)
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

- name: Enable UFW
  community.general.ufw:
    state: enabled
