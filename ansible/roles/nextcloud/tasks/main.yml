- name: Create Nextcloud directory
  file:
    path: "{{ docker_root }}/nextcloud"
    state: directory
    mode: '0755'

- name: Create .env for Nextcloud
  copy:
    dest: "{{ docker_root }}/nextcloud/.env"
    content: |
      # === Nextcloud ===
      NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.dealmeida.cloud
      NEXTCLOUD_ADMIN_USER={{ nextcloud_admin_user }}
      NEXTCLOUD_ADMIN_PASSWORD={{ nextcloud_admin_password }}

      # === Database ===
      POSTGRES_HOST=nextcloud-postgres
      POSTGRES_DB=nextcloud
      POSTGRES_USER=postgres
      POSTGRES_PASSWORD={{ postgres_password }}

      # === Redis ===
      REDIS_HOST=redis

- name: Ensure Nextcloud internal network
  docker_network:
    name: nextcloud-net
    driver: bridge
    state: present

- name: Deploy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: "{{ docker_root }}/nextcloud/docker-compose.yml"
    mode: '0644'

- name: Start Nextcloud (using Docker Compose CLI v2)
  shell: docker compose up -d
  args:
    chdir: "{{ docker_root }}/nextcloud"

- name: Wait for Nextcloud config.php to be created
  ansible.builtin.wait_for:
    path: /srv/data/nextcloud/html/config/config.php
    state: present
    timeout: 120

- name: Configure Nextcloud reverse proxy
  ansible.builtin.blockinfile:
    path: /srv/data/nextcloud/html/config/config.php
    marker: "// {mark} ANSIBLE MANAGED NEXTCLOUD PROXY"
    insertafter: "\\$CONFIG = array \\("
    block: |
      'trusted_proxies' => array (
        0 => 'traefik',
        1 => '172.18.0.0/16',
      ),
      'overwriteprotocol' => 'https',
      'overwritehost' => 'nextcloud.dealmeida.cloud',
      'overwrite.cli.url' => 'https://nextcloud.dealmeida.cloud',
      'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
  register: nextcloud_config

- name: Restart Nextcloud if config.php has changed
  shell: docker compose restart nextcloud
  args:
    chdir: "{{ docker_root }}/nextcloud"
  when: nextcloud_config.changed

