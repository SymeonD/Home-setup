- name: Create traefik-secrets (ACME email from Vault)
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: traefik-secrets
        namespace: traefik
      type: Opaque
      stringData:
        acme-email: "{{ email }}"

- name: Apply Traefik CRDs
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/traefik/crds.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Apply Traefik RBAC
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/traefik/rbac.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Apply Traefik Deployment
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/traefik/deployment.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml


- name: Apply Traefik IngressRoutes
  kubernetes.core.k8s:
    state: present
    template: ingressroutes.yaml.j2
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Apply Traefik Service LoadBalancer
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/traefik/service.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    force: true

- name: Wait for Traefik pod to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/traefik -n traefik --timeout=120s
  changed_when: false

- name: Stop Docker Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ docker_root }}/traefik"
    state: absent
  ignore_errors: true
