- name: Ensure backup mount point exists
  ansible.builtin.file:
    path: /srv/backup
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure the backup disk is mounted
  ansible.posix.mount:
    path: /srv/backup
    src: /dev/backup-vg/backup
    fstype: ext4
    state: mounted
    opts: defaults

- name: Install backup tools
  ansible.builtin.apt:
    name:
      - restic
      - postgresql-client
      - rsync
    state: present
    update_cache: yes

- name: Ensure restic repository environment variable (no password)
  ansible.builtin.copy:
    dest: /etc/profile.d/restic.sh
    content: |
      export RESTIC_REPOSITORY=/srv/backup/restic-repo
      export RESTIC_PASSWORD_FILE=/root/.restic-password
    owner: root
    group: root
    mode: '0644'

- name: Store restic password in root-only file
  ansible.builtin.copy:
    dest: /root/.restic-password
    content: "{{ restic_password }}"
    owner: root
    group: root
    mode: '0400'

- name: Create restic repository (if not exists)
  ansible.builtin.command: restic init --password-file /root/.restic-password
  args:
    creates: /srv/backup/restic-repo/config
  environment:
    RESTIC_REPOSITORY: /srv/backup/restic-repo

- name: Create cron job for PostgreSQL backup
  ansible.builtin.cron:
    name: "Daily PostgreSQL backup"
    user: root
    minute: 0
    hour: 2
    job: "backup-homelab-postgres >> /var/log/backup_postgres.log 2>&1"
    state: present

- name: Create cron job for Restic backup
  ansible.builtin.cron:
    name: "Daily Restic backup"
    user: root
    minute: 0
    hour: 4
    job: "backup-homelab-restic >> /var/log/backup_restic.log 2>&1"
    state: present
