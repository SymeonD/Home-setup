- name: Create minecraft Secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: minecraft-secrets
        namespace: minecraft
      type: Opaque
      stringData:
        RCON_PASSWORD: "{{ rcon_password }}"

- name: Apply minecraft manifests
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/minecraft/minecraft.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml

- name: Stop Docker minecraft
  community.docker.docker_compose_v2:
    project_src: "{{ docker_root }}/minecraft"
    state: absent
  ignore_errors: true

- name: Remove minecraft transitional resources from traefik namespace
  kubernetes.core.k8s:
    state: absent
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    definition:
      - apiVersion: traefik.io/v1alpha1
        kind: IngressRouteTCP
        metadata:
          name: minecraft
          namespace: traefik
      - apiVersion: v1
        kind: Service
        metadata:
          name: minecraft-docker
          namespace: traefik
      - apiVersion: v1
        kind: Endpoints
        metadata:
          name: minecraft-docker
          namespace: traefik

- name: Reload prometheus config
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../k8s/monitoring/prometheus.yaml"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
