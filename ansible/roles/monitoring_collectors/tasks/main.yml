- name: Create docker directory
  file:
    path: "{{ docker_root }}/monitoring-collectors"
    state: directory
    mode: "0755"

- name: Create promtail data directory
  file:
    path: /srv/data/monitoring/promtail
    state: directory
    mode: "0755"

- name: Copy docker compose
  copy:
    src: docker-compose.yml
    dest: "{{ docker_root }}/monitoring-collectors/docker-compose.yml"

- name: Copy promtail config
  copy:
    src: promtail.yml
    dest: "{{ docker_root }}/monitoring-collectors/promtail.yml"

- name: Ensure monitoring external network exists
  community.docker.docker_network:
    name: monitoring-net
    state: present

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ docker_root }}/monitoring-collectors"
    state: present