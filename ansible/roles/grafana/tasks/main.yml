- name: Create docker directory
  file:
    path: "{{ docker_root }}/grafana"
    state: directory
    mode: "0755"

- name: Create grafana provisioning directories
  file:
    path: "{{ docker_root }}/grafana/provisioning/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - datasources
    - dashboards

- name: Create data directory
  file:
    path: /srv/data/monitoring/grafana
    state: directory
    owner: 472
    group: 472
    mode: "0755"

- name: Copy docker compose
  copy:
    src: docker-compose.yml
    dest: "{{ docker_root }}/grafana/docker-compose.yml"

- name: Copy provisioning datasources
  copy:
    src: loki.yml
    dest: "{{ docker_root }}/grafana/provisioning/datasources/loki.yml"
    owner: 472  # UID Grafana par défaut
    group: 472
    mode: "0644"

- name: Copy provisioning datasources
  copy:
    src: prometheus.yml
    dest: "{{ docker_root }}/grafana/provisioning/datasources/prometheus.yml"
    owner: 472  # UID Grafana par défaut
    group: 472
    mode: "0644"

- name: Copy provisioning dashboards
  copy:
    src: homelab-dashboard.json
    dest: "{{ docker_root }}/grafana/provisioning/dashboards/homelab-dashboard.json"
    owner: 472
    group: 472
    mode: "0644"

- name: Start grafana
  community.docker.docker_compose_v2:
    project_src: "{{ docker_root }}/grafana"
    state: present
