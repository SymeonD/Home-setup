apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: traefik
data:
  traefik.yml: |
    api:
      dashboard: true
      insecure: false

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https

      websecure:
        address: ":443"
        transport:
          respondingTimeouts:
            readTimeout: 600s
            idleTimeout: 600s
            writeTimeout: 600s

    certificatesResolvers:
      letsencrypt:
        acme:
          email: "${TRAEFIK_ACME_EMAIL}"
          storage: /acme/acme.json
          httpChallenge:
            entryPoint: web

    ping: {}

    providers:
      kubernetesCRD: {}
      kubernetesIngress: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v3.3
          args:
            - --configFile=/traefik.yml
          env:
            - name: TRAEFIK_ACME_EMAIL
              valueFrom:
                secretKeyRef:
                  name: traefik-secrets
                  key: acme-email
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
            - name: minecraft
              containerPort: 25565
            - name: dashboard
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /traefik.yml
              subPath: traefik.yml
            - name: acme
              mountPath: /acme
      volumes:
        - name: config
          configMap:
            name: traefik-config
        - name: acme
          hostPath:
            path: /srv/data/traefik
            type: Directory
