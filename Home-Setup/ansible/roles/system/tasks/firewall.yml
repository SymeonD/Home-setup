- name: Install UFW
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Set default incoming policy to deny
  ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing policy to allow
  ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  ufw:
    rule: allow
    name: OpenSSH

- name: Allow HTTP (80)
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS (443)
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
