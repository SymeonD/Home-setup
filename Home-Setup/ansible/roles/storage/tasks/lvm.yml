- name: Create docker group
  lvg:
    vg: ubuntu-vg
    pvs: /dev/nvme0n1p3
  register: vg_created

- name: Create docker volume
  lvol:
    vg: ubuntu-vg
    lv: docker
    size: 50G
    state: present

- name: Create data volume
  lvol:
    vg: ubuntu-vg
    lv: data
    size: 800G
    state: present