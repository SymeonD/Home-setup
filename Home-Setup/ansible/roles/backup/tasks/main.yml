- name: Ensure backup mount point exists
  file:
    path: /srv/backup
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure the backup disk is mounted
  mount:
    path: /srv/backup
    src: /dev/backup-vg/backup-lv
    fstype: ext4
    state: mounted
    opts: defaults

- name: Install backup tools
  apt:
    name:
      - restic
      - postgresql-client
      - rsync
    state: present
    update_cache: yes

- name: Ensure restic repo environment variables
  copy:
    dest: /etc/profile.d/restic.sh
    content: |
      export RESTIC_REPOSITORY=/srv/backup/restic
      export RESTIC_PASSWORD="{{ restic_password}}"
    mode: '0644'

- name: Create restic repository (if not exists)
  command: restic init
  args:
    creates: /srv/backup/restic/config
  environment:
    RESTIC_REPOSITORY: /srv/backup/restic
    RESTIC_PASSWORD: "{{ restic_password}}"

- name: Ensure backup scripts directory exists
  file:
    path: /srv/backup/backup-scripts
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy PostgreSQL backup script
  copy:
    src: backup_postgres.sh
    dest: /srv/backup/backup-scripts/backup_postgres.sh
    mode: '0755'

- name: Copy Restic backup script
  copy:
    src: backup_restic.sh
    dest: /srv/backup/backup-scripts/backup_restic.sh
    mode: '0755'
  vars:
    restic_password: "{{ restic_password}}"

- name: Create cron job for PostgreSQL backup
  cron:
    name: "Daily PostgreSQL backup"
    user: root
    minute: 0
    hour: 2
    job: "/srv/backup/backup-scripts/backup_postgres.sh >> /var/log/backup_postgres.log 2>&1"
    state: present

- name: Create cron job for Restic backup
  cron:
    name: "Daily Restic backup"
    user: root
    minute: 0
    hour: 4
    job: "/srv/backup/backup-scripts/backup_restic.sh >> /var/log/backup_restic.log 2>&1"
    state: present
