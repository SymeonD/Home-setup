---
- name: Create Traefik directory
  file:
    path: "{{ docker_root }}/traefik"
    state: directory
    mode: '0755'

- name: Create .env for Traefik
  copy:
    dest: "{{ docker_root }}/traefik/.env"
    content: |
      # === Traefik ===
      DOMAIN=DOMAIN_REDACTED

- name: Ensure Traefik external network exists
  community.docker.docker_network:
    name: traefik-net
    state: present

- name: Deploy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: "{{ docker_root }}/traefik/docker-compose.yml"
    mode: '0644'

- name: Ensure acme.json exists with permissions
  file:
    path: "{{ docker_root }}/traefik/acme.json"
    state: file
    owner: root
    group: root
    mode: '0644'

- name: Deploy Traefik config
  copy:
    src: traefik.yml
    dest: "{{ docker_root }}/traefik/traefik.yml"
    mode: '0644'

- name: Start Traefik (using Docker Compose CLI v2)
  shell: docker compose up -d
  args:
    chdir: "{{ docker_root }}/traefik"
