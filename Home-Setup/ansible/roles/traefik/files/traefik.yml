api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 600s
        idleTimeout: 600s
        writeTimeout: 600s

  minecraft:
    address: ":25565"
    transport:
      respondingTimeouts:
        readTimeout: 600s
        idleTimeout: 600s
        writeTimeout: 600s

certificatesResolvers:
  letsencrypt:
   acme:
     email: EMAIL_REDACTED
     storage: /acme.json
     httpChallenge:
       entryPoint: web
  # letsencrypt-staging:
  #   acme:
  #     email: EMAIL_REDACTED
  #     storage: /acme.json
  #     httpChallenge:
  #       entryPoint: web
  #     caServer: https://acme-staging-v02.api.letsencrypt.org/directory
  #     tlschallenge: true
      
providers:
  docker:
    exposedByDefault: false
