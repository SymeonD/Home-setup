- name: Create docker directory
  file:
    path: "{{ docker_root }}/grafana"
    state: directory
    mode: "0755"

- name: Create data directory
  file:
    path: /srv/data/monitoring/grafana
    state: directory
    owner: 472
    group: 472
    mode: "0755"

- name: Copy docker compose
  copy:
    src: docker-compose.yml
    dest: "{{ docker_root }}/grafana/docker-compose.yml"

- name: Copy provisioning datasources
  copy:
    src: "provisioning/datasources/"
    dest: "{{ docker_root }}/grafana/provisioning/datasources/"
    owner: 472  # UID Grafana par défaut
    group: 472
    mode: "0644"
    remote_src: yes

- name: Copy provisioning dashboards
  copy:
    src: "provisioning/dashboards/"
    dest: "{{ docker_root }}/grafana/provisioning/dashboards/"
    owner: 472
    group: 472
    mode: "0644"
    remote_src: yes

- name: Start grafana (using Docker Compose CLI v2)
  shell: docker compose up -d
  args:
    chdir: "{{ docker_root }}/grafana"
